# Per-AZ NodePool for Aerospike baseline workload (i8g.2xlarge).
# Substitute KARPENTER_NODEPOOL_ZONE_NAME, NODE_ZONE, NODE_TYPE, KARPENTER_* before apply.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: ${KARPENTER_NODEPOOL_ZONE_NAME}
spec:
  template:
    metadata:
      labels:
        workshop.aerospike.com/workload: aerospike
        workshop.aerospike.com/node-pool: baseline
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: ${KARPENTER_NODECLASS_NAME}
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: [arm64]
        - key: kubernetes.io/os
          operator: In
          values: [linux]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["${NODE_TYPE}"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["${NODE_ZONE}"]
      expireAfter: 720h
      terminationGracePeriod: 600s
  limits:
    cpu: "64"
    memory: 256Gi
  disruption:
    consolidationPolicy: "${KARPENTER_CONSOLIDATION}"
    consolidateAfter: 30m
  weight: 10
