# NVMe bootstrap for all database nodes — replaces manual node-shell loop.
# Partitions instance-store NVMe per workshop/config/disk-layouts.yaml and symlinks
# block devices into /mnt/disks for local-volume-provisioner.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvme-bootstrap
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvme-bootstrap
    workshop.aerospike.com/component: local-storage
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvme-bootstrap
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvme-bootstrap
    spec:
      priorityClassName: system-node-critical
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - i8g.4xlarge
                      - i8g.8xlarge
                      - i8g.2xlarge
      initContainers:
        - name: init-nvme
          image: public.ecr.aws/amazonlinux/amazonlinux:2023
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -ec
            - |
              if ! command -v parted >/dev/null || ! command -v nvme >/dev/null || ! python3 -c "import yaml" 2>/dev/null; then
                echo "Installing NVMe bootstrap packages (first run can take several minutes per node)..."
                dnf install -y parted util-linux python3-pyyaml nvme-cli
              else
                echo "NVMe bootstrap packages already present — skipping dnf install"
              fi
              echo "Running disk bootstrap..."
              python3 /config/nvme-init.py
              echo "NVMe bootstrap init complete."
          volumeMounts:
            - name: host-mnt-disks
              mountPath: /host/mnt/disks
            - name: host-bootstrap-state
              mountPath: /host/var/lib/workshop/nvme-bootstrap
            - name: host-dev
              mountPath: /dev
            - name: nvme-config
              mountPath: /config
              readOnly: true
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
      volumes:
        - name: host-mnt-disks
          hostPath:
            path: /mnt/disks
            type: DirectoryOrCreate
        - name: host-bootstrap-state
          hostPath:
            path: /var/lib/workshop/nvme-bootstrap
            type: DirectoryOrCreate
        - name: host-dev
          hostPath:
            path: /dev
        - name: nvme-config
          configMap:
            name: nvme-disk-layouts
