# eksctl ClusterConfig reference for main lab cluster (NOT applied directly).
# Bootstrap uses K8S_VERSION from scripts/env/workshop.env via 02-bootstrap-eks.sh (CLI flags).
# Workload nodegroup is created in Lab 1.1 via lab-nodes.sh using workshop.env:
#
#   NODEGROUP_NAME      (default ng-aerospike)
#   NODE_TYPE           (default i8g.2xlarge)
#   NODE_COUNT          (default 4)
#   AWS_ZONES           (default us-east-1c, us-east-1d)
#   CLUSTER_NAME        (default my-cluster)
#   SSH_PUBLIC_KEY
#
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: my-cluster
  region: us-east-1
  version: "1.33"
availabilityZones:
  - us-east-1c
  - us-east-1d
# Workload managedNodeGroups — one per AZ; see NODEGROUP_NAME and AWS_ZONES in scripts/env/workshop.env
# managedNodeGroups:
#   - name: ${NODEGROUP_NAME}-us-east-1c
#     availabilityZones: [us-east-1c]
#   - name: ${NODEGROUP_NAME}-us-east-1d
#     availabilityZones: [us-east-1d]
#     ssh:
#       allow: true
#       publicKeyName: ${SSH_PUBLIC_KEY}
