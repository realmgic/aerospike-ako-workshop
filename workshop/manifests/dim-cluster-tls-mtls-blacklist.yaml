# Training: mTLS + PKIOnly + client cert blacklist (Lab 3.5)
apiVersion: asdb.aerospike.com/v1
kind: AerospikeCluster
metadata:
  name: aerocluster
  namespace: aerospike
spec:
  size: 3
  image: aerospike/aerospike-server-enterprise:8.1.0.0
  enableDynamicConfigUpdate: true
  operatorClientCert:
    secretCertSource:
      secretName: tls-ako-client-secret
      caCertsFilename: cacert.pem
      clientCertFilename: ako_client.pem
      clientKeyFilename: ako_client.key
    tlsClientName: ako-operator
  podSpec:
    nodeSelector:
      workshop.aerospike.com/node-pool: baseline
    multiPodPerHost: false
    aerospikeContainer:
      resources:
        requests:
          cpu: '7'
          memory: 57Gi
        limits:
          cpu: '7'
          memory: 57Gi
    sidecars:
    - name: aerospike-prometheus-exporter
      image: aerospike/aerospike-prometheus-exporter:1.33.0
      ports:
      - containerPort: 9145
        name: exporter
      env:
      - name: AS_AUTH_MODE
        value: pki
      - name: AS_CERT_FILE
        value: /etc/aerospike/tls/client/exporter.pem
      - name: AS_KEY_FILE
        value: /etc/aerospike/tls/client/exporter.key
      - name: AS_ROOT_CA
        value: /etc/aerospike/tls/ca/cacert.pem
      - name: AS_NODE_TLS_NAME
        value: aerocluster
      - name: AS_PORT
        value: '4333'
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 128Mi
  storage:
    filesystemVolumePolicy:
      cascadeDelete: true
      initMethod: deleteFiles
    volumes:
    - name: workdir
      source:
        persistentVolume:
          storageClass: ssd
          volumeMode: Filesystem
          size: 3Gi
      aerospike:
        path: /opt/aerospike
    - name: aerospike-config-secret
      source:
        secret:
          secretName: aerospike-secret
      aerospike:
        path: /etc/aerospike/secret
    - name: tls-server-certs
      source:
        secret:
          secretName: tls-server-secret
      aerospike:
        path: /etc/aerospike/tls
    - name: tls-ca
      source:
        secret:
          secretName: tls-ca-secret
      aerospike:
        path: /etc/aerospike/tls/ca
      sidecars:
      - containerName: aerospike-prometheus-exporter
        path: /etc/aerospike/tls/ca
        mountOptions:
          readOnly: true
    - name: tls-client-exporter
      source:
        secret:
          secretName: tls-client-exporter-secret
      aerospike:
        path: /etc/aerospike/tls/client-exporter
      sidecars:
      - containerName: aerospike-prometheus-exporter
        path: /etc/aerospike/tls/client
        mountOptions:
          readOnly: true
    - name: tls-cert-blacklist
      source:
        secret:
          secretName: tls-cert-blacklist-secret
      aerospike:
        path: /etc/aerospike/tls/blacklist
  aerospikeAccessControl:
    users:
    - name: admin
      authMode: PKIOnly
      roles:
      - sys-admin
      - user-admin
    - name: app
      authMode: PKIOnly
      roles:
      - read
      - write
    - name: exporter
      authMode: PKIOnly
      roles: []
  aerospikeConfig:
    service:
      feature-key-file: /etc/aerospike/secret/features.conf
    security: {}
    network:
      service:
        port: 3000
        tls-name: aerocluster
        tls-port: 4333
        tls-authenticate-client: any
      fabric:
        port: 3001
      heartbeat:
        port: 3002
      admin:
        port: 3003
      tls:
      - name: aerocluster
        cert-file: /etc/aerospike/tls/svc_chain.pem
        key-file: /etc/aerospike/tls/svc_key.pem
        ca-file: /etc/aerospike/tls/ca/cacert.pem
        cert-blacklist: /etc/aerospike/tls/blacklist/revoked.txt
    namespaces:
    - name: test
      replication-factor: 2
      migrate-sleep: 0
      indexes-memory-budget: 15461882265
      storage-engine:
        type: memory
        data-size: 30923764531
