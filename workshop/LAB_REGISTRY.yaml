# AKO Training Lab Registry
# Single source of truth for lab metadata, dependencies, and validation status.
# Add new labs by copying _templates/lab-walkthrough.md and appending here.
#
# node_provisioning: orthogonal to deploy_paths — [eksctl] | [eksctl, karpenter]
# Main-cluster labs support both unless noted. Lab 2.6 upgrade-lab is eksctl-only.
# Lab 2.5 k8sNodeBlockList is eksctl-only (see eksctl_only_features).

sections:
  - id: "00-environment-setup"
    title: Environment Setup
    path: sections/00-environment-setup
    status: active
  - id: "01-scaling-and-capacity"
    title: Scaling & Capacity
    path: sections/01-scaling-and-capacity
    status: active
  - id: "02-maintenance-and-upgrade"
    title: Maintenance & Upgrade
    path: sections/02-maintenance-and-upgrade
    status: active
  - id: "03-future-section"
    title: Reserved for future sections
    path: sections/03-future-section
    status: stub

