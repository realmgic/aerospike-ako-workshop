# Mirrors manifests/dim-cluster.yaml
replicas: 3
batchSize: 1
enableDynamicConfigUpdate: true

image:
  repository: aerospike/aerospike-server-enterprise
  tag: "8.1.0.0"

podSpec:
  multiPodPerHost: false
  aerospikeContainer:
    resources:
      requests:
        cpu: "15"
        memory: 115Gi
      limits:
        cpu: "15"
        memory: 115Gi
  sidecars:
    - name: aerospike-prometheus-exporter
      image: aerospike/aerospike-prometheus-exporter:1.33.0
      ports:
        - containerPort: 9145
          name: exporter
      env:
        - name: AS_AUTH_USER
          value: exporter
        - name: AS_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: auth-exporter-secret
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 128Mi


storage:
  filesystemVolumePolicy:
    cascadeDelete: true
    initMethod: deleteFiles
  volumes:
    - name: workdir
      source:
        persistentVolume:
          storageClass: ssd
          volumeMode: Filesystem
          size: 3Gi
      aerospike:
        path: /opt/aerospike
    - name: aerospike-config-secret
      source:
        secret:
          secretName: aerospike-secret
      aerospike:
        path: /etc/aerospike/secret

aerospikeAccessControl:
  users:
    - name: admin
      secretName: auth-secret
      roles:
        - sys-admin
        - user-admin
    - name: app
      secretName: auth-app-secret
      roles:
        - read
        - write
    - name: exporter
      secretName: auth-exporter-secret
      roles: []


aerospikeConfig:
  service:
    feature-key-file: /etc/aerospike/secret/features.conf
  security: {}
  network:
    service:
      port: 3000
    fabric:
      port: 3001
    heartbeat:
      port: 3002
    admin:
      port: 3003
  namespaces:
    - name: test
      replication-factor: 2
      migrate-sleep: 0 # For demo purposes only
      indexes-memory-budget: 30923764531  # 25% of 115.2 GiB (90% of 128 GiB) = 28.8 GiB
      storage-engine:
        type: memory
        data-size: 61847529062  # 50% of 115.2 GiB (90% of 128 GiB) = 57.6 GiB
