# Lab 3.2: TLS only (standard auth) — overlay for helm/base-disk-cluster-values.yaml
# Server cert only; clients use username/password over encrypted transport (port 4333).
operatorClientCert:
  secretCertSource:
    secretName: tls-server-secret
    caCertsFilename: cacert.pem
    clientCertFilename: svc_chain.pem
    clientKeyFilename: svc_key.pem
  tlsClientName: aerocluster
podSpec:
  sidecars:
    - name: aerospike-prometheus-exporter
      image: aerospike/aerospike-prometheus-exporter:1.33.0
      ports:
        - containerPort: 9145
          name: exporter
      env:
        - name: AS_AUTH_USER
          value: exporter
        - name: AS_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: auth-exporter-secret
        - name: AS_NODE_TLS_NAME
          value: aerocluster
        - name: AS_TLS_ENABLE
          value: "true"
        - name: AS_TLS_CAFILE
          value: /etc/aerospike/tls/ca/cacert.pem
      volumeMounts:
        - name: tls-ca
          mountPath: /etc/aerospike/tls/ca
          readOnly: true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 128Mi
storage:
  volumes:
    - name: workdir
      source:
        persistentVolume:
          storageClass: ssd
          volumeMode: Filesystem
          size: 3Gi
      aerospike:
        path: /opt/aerospike
    - name: ns
      source:
        persistentVolume:
          storageClass: local-ssd
          volumeMode: Block
          accessModes: ["ReadWriteOnce"]
          size: 250Gi
      aerospike:
        path: /dev/data/local1
    - name: aerospike-config-secret
      source:
        secret:
          secretName: aerospike-secret
      aerospike:
        path: /etc/aerospike/secret
    - name: tls-server-certs
      source:
        secret:
          secretName: tls-server-secret
      aerospike:
        path: /etc/aerospike/tls
    - name: tls-ca
      source:
        secret:
          secretName: tls-ca-secret
      aerospike:
        path: /etc/aerospike/tls/ca
aerospikeConfig:
  network:
    service:
      tls-name: aerocluster
      tls-port: 4333
      tls-authenticate-client: false
    tls:
      - name: aerocluster
        cert-file: /etc/aerospike/tls/svc_chain.pem
        key-file: /etc/aerospike/tls/svc_key.pem
        ca-file: /etc/aerospike/tls/ca/cacert.pem
