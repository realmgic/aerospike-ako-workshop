# Lab 1.4: replication-factor 3 — overlay for helm/disk-cluster-values.yaml
aerospikeConfig:
  namespaces:
    - name: test
      replication-factor: 3
      migrate-sleep: 0 # For demo purposes only
      indexes-memory-budget: 49478021959  # 80% of 57.6 GiB (90% of 64 GiB) = 46.08 GiB
      storage-engine:
        type: device
        devices:
          - /dev/data/local1
