# Mirrors dim-cluster-tls-mtls-pki-only.yaml
replicas: 3
enableDynamicConfigUpdate: true
image:
  repository: aerospike/aerospike-server-enterprise
  tag: 8.1.0.0
operatorClientCert:
  secretCertSource:
    secretName: tls-ako-client-secret
    caCertsFilename: cacert.pem
    clientCertFilename: ako_client.pem
    clientKeyFilename: ako_client.key
  tlsClientName: ako-operator
podSpec:
  nodeSelector:
    workshop.aerospike.com/node-pool: baseline
  multiPodPerHost: false
  aerospikeContainer:
    resources:
      requests:
        cpu: '7'
        memory: 57Gi
      limits:
        cpu: '7'
        memory: 57Gi
  sidecars:
  - name: aerospike-prometheus-exporter
    image: aerospike/aerospike-prometheus-exporter:1.33.0
    ports:
    - containerPort: 9145
      name: exporter
    env:
    - name: AS_AUTH_MODE
      value: pki
    - name: AS_CERT_FILE
      value: /etc/aerospike/tls/client/exporter.pem
    - name: AS_KEY_FILE
      value: /etc/aerospike/tls/client/exporter.key
    - name: AS_ROOT_CA
      value: /etc/aerospike/tls/ca/cacert.pem
    - name: AS_NODE_TLS_NAME
      value: aerocluster
    - name: AS_TLS_ENABLE
      value: 'true'
    volumeMounts:
    - name: tls-ca
      mountPath: /etc/aerospike/tls/ca
      readOnly: true
    - name: tls-client-exporter
      mountPath: /etc/aerospike/tls/client
      readOnly: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 128Mi
storage:
  filesystemVolumePolicy:
    cascadeDelete: true
    initMethod: deleteFiles
  volumes:
  - name: workdir
    source:
      persistentVolume:
        storageClass: ssd
        volumeMode: Filesystem
        size: 3Gi
    aerospike:
      path: /opt/aerospike
  - name: aerospike-config-secret
    source:
      secret:
        secretName: aerospike-secret
    aerospike:
      path: /etc/aerospike/secret
  - name: tls-server-certs
    source:
      secret:
        secretName: tls-server-secret
    aerospike:
      path: /etc/aerospike/tls
  - name: tls-ca
    source:
      secret:
        secretName: tls-ca-secret
    aerospike:
      path: /etc/aerospike/tls/ca
  - name: tls-client-exporter
    source:
      secret:
        secretName: tls-client-exporter-secret
    aerospike:
      path: /etc/aerospike/tls/client-exporter
aerospikeAccessControl:
  users:
  - name: admin
    secretName: auth-secret
    authMode: PKIOnly
    roles:
    - sys-admin
    - user-admin
  - name: app
    secretName: auth-app-secret
    authMode: PKIOnly
    roles:
    - read
    - write
  - name: exporter
    secretName: auth-exporter-secret
    authMode: PKIOnly
    roles: []
aerospikeConfig:
  service:
    feature-key-file: /etc/aerospike/secret/features.conf
  security: {}
  network:
    service:
      port: 3000
      tls-name: aerocluster
      tls-port: 4333
      tls-authenticate-client: any
    fabric:
      port: 3001
    heartbeat:
      port: 3002
    admin:
      port: 3003
    tls:
    - name: aerocluster
      cert-file: /etc/aerospike/tls/svc_chain.pem
      key-file: /etc/aerospike/tls/svc_key.pem
      ca-file: /etc/aerospike/tls/ca/cacert.pem
  namespaces:
  - name: test
    replication-factor: 2
    migrate-sleep: 0
    indexes-memory-budget: 15461882265
    storage-engine:
      type: memory
      data-size: 30923764531
