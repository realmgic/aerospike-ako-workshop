# Instance-type NVMe partition layouts for nvme-bootstrap DaemonSet.
# Partitions are symlinked into /host/mnt/disks/ for local-volume-provisioner.
# Devices are discovered via nvme-cli (Amazon EC2 NVMe Instance Storage) — not
# hardcoded nvme names, which vary by instance type and root volume attachment.
#
# i8g.2xlarge:  1900 GB instance store — 3× 512 GiB partitions on first local SSD
# i8g.4xlarge: 3750 GB instance store — 6× 512 GiB partitions on first local SSD
# i8g.8xlarge: 2× local SSD — 6× 512 GiB partitions on each disk (12 total)

force_layout: ""  # optional override (workshop.env NVME_DISK_LAYOUT); empty = use IMDS instance-type

layouts:
  i8g.2xlarge:
    instance_store: first
    partitions:
      - number: 1
        start: 0%
        end: 512GiB
      - number: 2
        start: 512GiB
        end: 1024GiB
      - number: 3
        start: 1024GiB
        end: 1536GiB

  i8g.4xlarge:
    instance_store: all
    partitions:
      - number: 1
        start: 0%
        end: 512GiB
      - number: 2
        start: 512GiB
        end: 1024GiB
      - number: 3
        start: 1024GiB
        end: 1536GiB
      - number: 4
        start: 1536GiB
        end: 2048GiB
      - number: 5
        start: 2048GiB
        end: 2560GiB
      - number: 6
        start: 2560GiB
        end: 3072GiB  # remainder of device left unallocated for overprovisioning

  i8g.8xlarge:
    instance_store: all
    partitions:
      - number: 1
        start: 0%
        end: 512GiB
      - number: 2
        start: 512GiB
        end: 1024GiB
      - number: 3
        start: 1024GiB
        end: 1536GiB
      - number: 4
        start: 1536GiB
        end: 2048GiB
      - number: 5
        start: 2048GiB
        end: 2560GiB
      - number: 6
        start: 2560GiB
        end: 3072GiB  # same 6× 512 GiB per disk; remainder unallocated on each

  default:
    mode: whole-device
    instance_store: all
